<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento de Vistoria - Delta Vistoria</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <header id="inicio">
        <div class="header-visual">
            <a href="index.html">
                <img src="img/logo.png" alt="Logo Delta Vistoria" class="logo">
            </a>
            <img src="img/bg_fixed.png" alt="Background Header" class="bg-header">
            <img src="img/menu_bg.png" alt="Menu bg" class="menu-bg">
        </div>
        <nav class="menu">
            <ul>
                <li><a href="index.html#inicio">INÍCIO</a></li>
                <li><a href="index.html#quemsomos">QUEM SOMOS</a></li>
                <li><a href="index.html#informacoes">LOCALIZAÇÃO</a></li>
                <li><a href="agendamento.html">AGENDE SUA VISTORIA</a></li>
            </ul>
        </nav>
    </header>

    <section class="form-agendamento-completo">
        <div class="formulario-agendamento">
            <h2 class="titulo-agendamento">Agende sua Vistoria</h2>
            <form action="salvar_agendamento.php" method="post" class="formulario-padrao"> 
                
                <div class="form-flex">
                    <div class="input-flex">
                        <label for="nome">Nome Completo:</label>
                        <input type="text" id="nome" name="nome" required>
                    </div>
                    <div class="input-flex">
                        <label for="telefone">Telefone:</label>
                        <input type="tel" id="telefone" name="telefone" required>
                    </div>
                </div>

                <div class="campo-centralizado">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-flex">
                    <div class="input-flex">
                        <label for="data">Data Desejada:</label>
                        <input type="date" id="data" name="data" required>
                    </div>
                    <div class="input-flex">
                        <label for="placa">Placa do Veículo (Opcional):</label>
                        <input type="text" id="placa" name="placa">
                    </div>
                </div>

                <div class="campo-centralizado-footer">
                    <label for="observacoes">Observações (Opcional):</label>
                    <textarea id="observacoes" name="observacoes" rows="3"></textarea>
                    
                    <button type="submit">Confirmar Agendamento</button>
                </div>
            </form>
        </div>
    </section>
    
    <footer class="footer">
        <div>
            <a href="index.html#inicio">
                <img src="img/logo_rodape.png" alt="Rodapé" class="footer-logo">
            </a>
        </div>
    </footer>

</body>
</html>
